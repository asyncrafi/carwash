<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="background: #1a73e8; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0;">
    <h1 style="margin: 0;">CarWash</h1>
  </div>
  <div style="padding: 20px; border: 1px solid #e0e0e0; border-top: 0; border-radius: 0 0 8px 8px;">
    <h2>Hello {{ name }}!</h2>
    {% block content %}{% endblock %}
    {% if code %}
    <div style="text-align: center; margin: 30px 0;">
      <span style="font-size: 32px; font-weight: bold; letter-spacing: 8px; background: #f5f5f5; padding: 15px 30px; border-radius: 8px;">{{ code }}</span>
    </div>
    <p style="color: #666; font-size: 12px;">This code expires in 10 minutes.</p>
    {% endif %}
    <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
    <p style="color: #999; font-size: 12px;">CarWash App &mdash; On-demand car wash service</p>
  </div>
</body>
</html>
